server:
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD:youshallnotpass}"
    sources:
      youtube: false          # deve restare FALSE — YouTube è gestito solo dal plugin dev.lavalink.youtube
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
# ─────────────────────────────────────────────
# RIGENERAZIONE TOKEN OAUTH YOUTUBE (token scaduto dopo ~3 mesi)
# ─────────────────────────────────────────────
# PASSO 1: su Render, svuota (NON cancellare) la variabile d'ambiente
#          LAVALINK_YOUTUBE_REFRESH_TOKEN e riavvia questo servizio Lavalink.
# PASSO 2: nei log di avvio comparirà un link tipo:
#          "To give lavalink access to your account, go to
#           https://www.google.com/device and enter code XXX-XXX-XXX"
#          Aprilo da browser, fai login (meglio un account Google secondario)
#          e autorizza.
# PASSO 3: nei log comparirà il nuovo refresh token, es:
#          "Login Successful. Refresh token: 1//0g..................."
#          Copialo e reimpostalo come LAVALINK_YOUTUBE_REFRESH_TOKEN su Render.
# PASSO 4: riavvia di nuovo il servizio Lavalink con il nuovo token impostato.
#          skipInitialization resta false così, se scadesse di nuovo in futuro,
#          te ne accorgerai subito dai log di avvio invece che da /play rotto.
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - WEB
      - WEBEMBEDDED        # aggiunto come fallback: se WEB viene bloccato su un video,
      - TVHTML5EMBEDDED     # questi due spesso riescono comunque a caricarlo
    oauth:
      enabled: true
      skipInitialization: false   # deve restare false finché non confermi che il nuovo token funziona
      refreshToken: "${LAVALINK_YOUTUBE_REFRESH_TOKEN:}"
  lavasrc:
    providers:                  # ordine di ricerca quando convertiamo da Spotify a stream reale
      - "ytsearch:\"%ISRC%\""   # prova prima per codice ISRC (più precisa)
      - "ytsearch:%QUERY%"      # poi ricerca normale su YouTube
      - "scsearch:%QUERY%"      # infine fallback SoundCloud
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false           # lasciamo gestire YouTube al plugin youtube-source, non a LavaSrc
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "IT"
metrics:
  prometheus:
    enabled: false
    endpoint: /metrics
sentry:
  dsn: ""
logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
