server:
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD:youshallnotpass}"
    sources:
      youtube: false          # ⬅️ FIX: deve essere FALSE — disabilita il vecchio source built-in deprecato (senza OAuth) e lascia gestire YouTube solo al plugin dev.lavalink.youtube
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
# Il plugin youtube usa i nomi interni WEB_REMIX, WEB, ANDROID_VR ecc.
# OAuth funziona automaticamente su tutti i client compatibili
# quando refreshToken è impostato — non serve specificare client OAuth separati.
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - WEB                # supporta OAuth e ricerca testuale
    oauth:
      enabled: true
      skipInitialization: false   # ⬅️ FIX: deve essere false la prima volta, per generare il link OAuth nei log
      refreshToken: "${LAVALINK_YOUTUBE_REFRESH_TOKEN:}"
  lavasrc:
    providers:                  # ordine di ricerca quando convertiamo da Spotify a stream reale
      - "ytsearch:\"%ISRC%\""   # prova prima per codice ISRC (più precisa)
      - "ytsearch:%QUERY%"      # poi ricerca normale su YouTube
      - "scsearch:%QUERY%"      # infine fallback SoundCloud
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false           # lasciamo gestire YouTube al plugin youtube-source, non a LavaSrc
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "IT"
metrics:
  prometheus:
    enabled: false
    endpoint: /metrics
sentry:
  dsn: ""
logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
